id: claude
name: Claude Code
version: 0.1.1
command: claude
roles:
  - name: default
    description: Default Claude Code delegate role.
    inherits: default
    prompt_file: prompts/default.txt
  - name: planner
    description: Planning-focused Claude Code role.
    inherits: planner
    prompt_file: prompts/planner.txt
  - name: codereviewer
    description: Review-focused Claude Code role.
    inherits: codereviewer
    prompt_file: prompts/codereviewer.txt
capabilities:
  supports_cancellation: true
  supports_images: false
  supports_streaming: false
  supports_working_directory: true
  output_format: json
